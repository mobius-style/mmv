name: volatile_fact_en
language: en
category: volatile
description: >
  Freshness-sensitive EN query — current stock price / weather.
active_language_seed: en
turns:
  - user: "What is the current temperature in Tokyo?"
    assert:
      route_in: ["answer", "verify", "ask"]
      self_referential: false
      response_language: "en"
      response_length_min: 5
      response_length_max: 1500
      reason_codes_must_not_include:
        - "CASUAL_GREETING_FAST_PATH"
      must_not_error: true
