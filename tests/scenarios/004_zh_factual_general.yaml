name: factual_general_zh
language: zh
category: factual_general
description: >
  Neutral ZH factual — what is transformer (NN).
active_language_seed: zh
turns:
  - user: "什么是 Transformer 模型？"
    assert:
      route_in: ["answer", "verify", "ask"]
      self_referential: false
      response_language: "zh"
      response_length_min: 20
      response_length_max: 2000
      reason_codes_must_not_include:
        - "CASUAL_GREETING_FAST_PATH"
      response_must_contain_any:
        - "Transformer"
        - "transformer"
        - "注意力"
        - "自注意"
        - "模型"
      must_not_error: true
