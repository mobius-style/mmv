name: casual_greeting_ja
language: ja
category: casual_greeting
description: >
  Pure JA greeting must take CASUAL_GREETING_FAST_PATH — Box W skipped,
  Box 0 skipped, brief acknowledgement response.
active_language_seed: ja
turns:
  - user: "こんにちは"
    assert:
      route: "answer"
      intent_type: "casual_greeting"
      self_referential: false
      box_0_consulted: false
      box_w_consulted: false
      response_language: "ja"
      response_length_min: 3
      response_length_max: 300
      reason_codes_must_include:
        - "CASUAL_GREETING_FAST_PATH"
      response_must_not_contain:
        - "Wikipedia"
        - "ヨルシカ"
        - "Yorushika"
        - "禁酒法"
      must_not_error: true
