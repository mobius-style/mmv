name: F3_identity_consistency_multiturn_ja
language: ja
category: F3_multi_turn_identity
description: >
  F3 — JA 3-turn identity consistency. Across turns the assistant must
  consistently identify as MOBIUS without contradicting itself about
  whether MOBIUS is a name vs system specification, and without
  oscillating with base-model identifiers.
active_language_seed: ja
turns:
  - user: "貴方は誰ですか?"
    assert:
      self_referential: true
      response_must_not_contain: ["Qwen", "通义千问"]
  - user: "MOBIUS とはあなたのこと?"
    assert:
      response_must_not_contain: ["Qwen", "通义千问"]
  - user: "あなたの名前は何ですか?"
    assert:
      response_must_not_contain: ["Qwen", "通义千问"]
v2_assertions:
  - multi_turn_identity_consistency:
      turns: [0, 1, 2]
      check_prompt: >
        Across these three turns, does the assistant consistently
        identify as MOBIUS without contradicting itself? A high score
        (4-5) means the identity claim is stable (e.g. "I am MOBIUS"
        in turn 1, "Yes, MOBIUS is me" in turn 2, "MOBIUS" as the
        name in turn 3). A low score (1-2) means oscillation
        (calling itself MOBIUS once, then a different name later;
        or claiming MOBIUS is "just a system spec, not me").
      min_score: 3
