name: volatile_fact_ja
language: ja
category: volatile
description: >
  Freshness-sensitive factual query (Tokyo temperature). Should route
  to verify or honestly indicate uncertainty — must not fabricate a
  specific number without grounding.
active_language_seed: ja
turns:
  - user: "東京の現在の気温は何度ですか？"
    assert:
      route_in: ["answer", "verify", "ask"]
      self_referential: false
      response_language: "ja"
      response_length_min: 5
      response_length_max: 1500
      reason_codes_must_not_include:
        - "CASUAL_GREETING_FAST_PATH"
      must_not_error: true
