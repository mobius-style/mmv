name: volatile_fact_zh
language: zh
category: volatile
description: >
  Freshness-sensitive ZH query.
active_language_seed: zh
turns:
  - user: "东京现在的气温是多少度？"
    assert:
      route_in: ["answer", "verify", "ask"]
      self_referential: false
      response_language: "zh"
      response_length_min: 5
      response_length_max: 1500
      reason_codes_must_not_include:
        - "CASUAL_GREETING_FAST_PATH"
      must_not_error: true
