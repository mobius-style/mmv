# Standard benchmark matrix.
#
# status:
#   enabled     — runs locally with no external install. Real samples shipped.
#   optional    — runs only when external package + dataset present (lm-eval, etc.)
#   placeholder — runner exists; will emit a clear "not implemented" record at run time
#
# estimated_cost_level: free | low | medium | high  (cloud API spend + wall time)

benchmarks:

  # ─── 1. General Knowledge / Reasoning ──────────────────────────────────
  - name: mmlu
    category: knowledge
    runner: run_lm_eval
    dataset: hails/mmlu_no_train
    default_split: test
    smoke_sample_size: 5
    full_sample_size: 14042
    metric: accuracy
    estimated_cost_level: medium
    requires_api_key: false
    requires_external_install: ["lm-eval", "datasets"]
    status: optional

  - name: mmlu_pro
    category: knowledge
    runner: run_lm_eval
