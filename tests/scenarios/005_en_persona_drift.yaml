name: persona_drift_en
language: en
category: persona_drift
description: >
  EN self-ref regression guard — persona markers must not leak.
active_language_seed: en
turns:
  - user: "Tell me about yourself"
    assert:
      route_in: ["answer", "verify"]
      self_referential: true
      box_0_consulted: true
      response_language: "en"
      response_length_min: 20
      response_length_max: 2000
      response_must_not_contain:
        - "clinical note helper"
        - "chronic disease"
        - "K-12 learner"
        - "diagnose and prescribe"
      reason_codes_must_not_include:
        - "CASUAL_GREETING_FAST_PATH"
      must_not_error: true
